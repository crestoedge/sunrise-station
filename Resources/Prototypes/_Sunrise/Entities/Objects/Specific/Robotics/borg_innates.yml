# Нано батарея для встроенных предметов, чтобы они не имели большой собственной ёмкости и потребляли энергию борга
- type: entity
  name: nano-capacity power cell
  description: A rechargeable power cell. Well, this is actually a huge super-capacitor.
  id: PowerCellNano
  suffix: Full
  parent: BasePowerCell
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: small
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: Battery
    maxCharge: 60
    startingCharge: 60
  - type: Tag
    tags:
      - PowerCellNano

- type: entity
  name: floodlight
  id: BorgInnateFloodlight
  parent: BaseLamp
  description: A pole with powerful mounted lights on it.
  categories: [ HideSpawnMenu ]
  components:
  - type: Item
    size: Normal
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellNano
  - type: Sprite
    sprite: Objects/Misc/Lights/lights.rsi
    layers:
      - state: floodlight
        map: [ "base" ]
      - state: floodlight-on
        shader: unshaded
        visible: false
        map: [ "light" ]
  - type: HandheldLight
    addPrefix: true
    blinkingBehaviourId: blinking
    radiatingBehaviourId: radiating
  - type: LightBehaviour
    behaviours:
      - !type:FadeBehaviour
        id: radiating
        maxDuration: 2.0
        startValue: 3.0
        endValue: 2.0
        isLooped: true
        reverseWhenFinished: true
      - !type:PulseBehaviour
        id: blinking
        interpolate: Nearest
        maxDuration: 1.0
        startValue: 0.1
        endValue: 2.0
        isLooped: true
  - type: PointLight
    enabled: false
    radius: 8
    energy: 5
    netsync: false

- type: entity
  abstract: true
  id: BorgVisionDeviceBase
  components:
  - type: ItemToggle
    predictable: false # issues between ToggleCellDraw and ItemToggleActiveSound
    onUse: true
    canActivateInhand: true
    soundActivate:
      path: /Audio/_Sunrise/Items/Goggles/activate.ogg
    soundDeactivate:
      path: /Audio/_Sunrise/Items/Goggles/deactivate.ogg
    soundFailToActivate:
      path: /Audio/Machines/button.ogg
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellNano

- type: entity
  parent: [ ClothingEyesNVD, BorgVisionDeviceBase ]
  id: NightVisionDeviceBorg
  name: borg NVD
  description: Nightvision googles in the shell.
  categories: [ HideSpawnMenu ]
  components:
  - type: ToggleClothing
    action: NVDToggleAction
    mustEquip: false
    disableOnUnequip: false
  - type: ComponentToggler
    parent: true
    components:
      - type: NightVision
        effect: EffectNightVisionBorg


- type: entity
  parent: [ ClothingEyesGlassesThermal, BorgVisionDeviceBase ]
  id: ThermalVisionDeviceBorg
  name: borg TVD
  description: Thermal googles in the shell.
  categories: [ HideSpawnMenu ]
  components:
  - type: ToggleClothing
    action: ActionToggleThermalVision
    mustEquip: false
    disableOnUnequip: false
